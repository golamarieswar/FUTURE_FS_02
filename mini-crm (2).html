<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadFlow CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0d14;
    --surface: #11151f;
    --surface2: #181d2a;
    --border: #232840;
    --accent: #4f8ef7;
    --accent2: #f7c948;
    --green: #27c98e;
    --orange: #f7834f;
    --red: #f75f5f;
    --text: #e8ecf5;
    --muted: #6b7394;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 230px; background: var(--surface); border-right: 1.5px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  }
  .logo {
    font-family: var(--font-head); font-weight: 800; font-size: 1.4rem;
    color: var(--accent); padding: 0 24px 28px; letter-spacing: -0.5px;
    border-bottom: 1.5px solid var(--border);
  }
  .logo span { color: var(--accent2); }
  .nav { padding: 20px 12px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 9px;
    cursor: pointer; font-size: 0.82rem; font-family: var(--font-mono); color: var(--muted);
    transition: all 0.18s; margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 24px; border-top: 1.5px solid var(--border); }
  .admin-badge {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--surface2); border-radius: 9px; border: 1px solid var(--border);
  }
  .admin-avatar {
    width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #0a0d14;
  }
  .admin-info { font-size: 0.7rem; }
  .admin-name { color: var(--text); font-family: var(--font-head); font-weight: 700; }
  .admin-role { color: var(--muted); }

  /* MAIN */
  .main { margin-left: 230px; flex: 1; padding: 32px; min-height: 100vh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .page-title { font-family: var(--font-head); font-size: 1.7rem; font-weight: 800; }
  .page-title span { color: var(--accent); }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: #0a0d14; }
  .btn-primary:hover { background: #6ba3ff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,247,0.35); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(247,95,95,0.15); color: var(--red); border: 1px solid rgba(247,95,95,0.3); }
  .btn-danger:hover { background: rgba(247,95,95,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 0.7rem; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-head); font-size: 2rem; font-weight: 800; }
  .stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }

  /* CONTROLS */
  .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 9px 14px 9px 36px; color: var(--text); font-family: var(--font-mono); font-size: 0.8rem;
    outline: none; transition: border-color 0.18s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; }
  select {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
    padding: 9px 14px; color: var(--text); font-family: var(--font-mono); font-size: 0.8rem;
    outline: none; cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    text-align: left; padding: 14px 16px; font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); font-weight: 700; font-family: var(--font-mono);
    border-bottom: 1.5px solid var(--border);
  }
  td { padding: 14px 16px; font-size: 0.78rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,0.04); }
  .lead-name { font-family: var(--font-head); font-weight: 700; color: var(--text); }
  .lead-email { color: var(--muted); font-size: 0.72rem; }
  .source-tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.67rem;
    font-weight: 700; background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.25);
  }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px;
    font-size: 0.68rem; font-weight: 700; font-family: var(--font-mono);
  }
  .status-new { background: rgba(79,142,247,0.13); color: var(--accent); border: 1px solid rgba(79,142,247,0.28); }
  .status-contacted { background: rgba(247,201,72,0.13); color: var(--accent2); border: 1px solid rgba(247,201,72,0.28); }
  .status-converted { background: rgba(39,201,142,0.13); color: var(--green); border: 1px solid rgba(39,201,142,0.28); }
  .actions { display: flex; gap: 6px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .modal {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px;
    width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow); animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform:translateY(20px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  .modal-head {
    padding: 22px 24px 16px; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px 24px; }
  .modal-foot { padding: 16px 24px; border-top: 1.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text);
    font-family: var(--font-mono); font-size: 0.8rem; outline: none; transition: border-color 0.18s;
  }
  .form-input:focus { border-color: var(--accent); }
  textarea.form-input { resize: vertical; min-height: 90px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* DETAIL PANEL */
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); margin-bottom: 10px; font-weight: 700;
  }
  .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.78rem; }
  .detail-key { color: var(--muted); }
  .detail-val { color: var(--text); font-weight: 700; }
  .note-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 8px; font-size: 0.78rem;
  }
  .note-date { font-size: 0.66rem; color: var(--muted); margin-bottom: 4px; }

  /* LOGIN */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px;
    padding: 40px; width: 400px; max-width: 95vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .login-logo { font-family: var(--font-head); font-size: 2rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--muted); font-size: 0.78rem; margin-bottom: 30px; }
  .login-error { background: rgba(247,95,95,0.1); border: 1px solid rgba(247,95,95,0.3); color: var(--red); border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; margin-bottom: 14px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 999;
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 14px 20px; font-size: 0.78rem; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 10px; animation: slideUp 0.2s ease;
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-text { font-size: 0.85rem; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { width: 60px; }
    .nav-item span, .logo, .admin-info { display: none; }
    .main { margin-left: 60px; padding: 20px 14px; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(5), td:nth-child(5) { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── DATA & STATE ──────────────────────────────────────────────────────────
const ADMIN = { user: 'admin', pass: 'admin123' };
const SOURCES = ['Website Form','Social Media','Referral','Cold Email','Event','Other'];
const STATUSES = ['new','contacted','converted'];

let state = {
  auth: false,
  leads: [
    { id:1, name:'Priya Sharma', email:'priya@gmail.com', phone:'9876543210', source:'Website Form', status:'new', notes:[{text:'Interested in enterprise plan',date:'2026-03-28'}], created:'2026-03-28' },
    { id:2, name:'Rahul Mehta', email:'rahul.m@company.in', phone:'9988776655', source:'Referral', status:'contacted', notes:[{text:'Called, scheduled demo for Friday',date:'2026-03-29'}], created:'2026-03-27' },
    { id:3, name:'Aisha Khan', email:'aisha@startup.io', phone:'8877665544', source:'Social Media', status:'converted', notes:[], created:'2026-03-25' },
    { id:4, name:'Vikram Iyer', email:'vikram@biz.com', phone:'9123456780', source:'Cold Email', status:'new', notes:[], created:'2026-03-30' },
    { id:5, name:'Sneha Patel', email:'sneha.p@corp.net', phone:'9012345678', source:'Event', status:'contacted', notes:[{text:'Follow up next week',date:'2026-03-30'}], created:'2026-03-26' },
  ],
  nextId: 6,
  view: 'leads',       // leads | dashboard
  modal: null,         // null | 'add' | 'edit' | 'detail' | 'note'
  selectedId: null,
  filter: { search:'', status:'all', source:'all' },
  toast: null,
  loginErr: '',
};

// ── RENDER ENGINE ─────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.auth) { app.innerHTML = loginHTML(); bindLogin(); return; }
  app.innerHTML = `
    <div class="layout">
      ${sidebarHTML()}
      <div class="main">
        ${state.view === 'dashboard' ? dashboardHTML() : leadsHTML()}
      </div>
    </div>
    ${state.modal ? modalHTML() : ''}
    ${state.toast ? `<div class="toast ${state.toast.type}">${state.toast.icon} ${state.toast.msg}</div>` : ''}
  `;
  bindAll();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
function loginHTML() {
  return `<div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Lead<span>Flow</span></div>
      <div class="login-sub">Mini CRM — Secure Admin Access</div>
      ${state.loginErr ? `<div class="login-error">⚠ ${state.loginErr}</div>` : ''}
      <div class="form-group"><label class="form-label">Username</label>
        <input class="form-input" id="l-user" placeholder="admin" value="admin"/></div>
      <div class="form-group"><label class="form-label">Password</label>
        <input class="form-input" id="l-pass" type="password" placeholder="••••••••" value="admin123"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px" id="login-btn">
        → Login to CRM
      </button>
      <p style="font-size:0.68rem;color:var(--muted);margin-top:16px;text-align:center">Demo: admin / admin123</p>
    </div>
  </div>`;
}
function bindLogin() {
  document.getElementById('login-btn').onclick = () => {
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value;
    if (u === ADMIN.user && p === ADMIN.pass) { state.auth = true; state.loginErr = ''; render(); }
    else { state.loginErr = 'Invalid credentials. Try admin / admin123'; render(); }
  };
  document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function sidebarHTML() {
  const n = (id, icon, label) =>
    `<button class="nav-item ${state.view===id?'active':''}" data-nav="${id}">
      <span class="nav-icon">${icon}</span><span>${label}</span>
    </button>`;
  return `<div class="sidebar">
    <div class="logo">Lead<span>Flow</span></div>
    <div class="nav">
      ${n('dashboard','◈','Dashboard')}
      ${n('leads','≡','All Leads')}
    </div>
    <div class="sidebar-footer">
      <div class="admin-badge">
        <div class="admin-avatar">A</div>
        <div class="admin-info">
          <div class="admin-name">Admin</div>
          <div class="admin-role">Super Admin</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="logout-btn" style="width:100%;margin-top:10px;justify-content:center">⏻ Logout</button>
    </div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function dashboardHTML() {
  const total = state.leads.length;
  const byStatus = s => state.leads.filter(l=>l.status===s).length;
  const bySrc = {};
  state.leads.forEach(l => bySrc[l.source] = (bySrc[l.source]||0)+1);
  return `
    <div class="topbar">
      <div class="page-title">Dash<span>board</span></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Leads</div><div class="stat-value" style="color:var(--accent)">${total}</div><div class="stat-sub">All time</div></div>
      <div class="stat-card"><div class="stat-label">New</div><div class="stat-value" style="color:var(--accent)">${byStatus('new')}</div><div class="stat-sub"><span class="dot" style="background:var(--accent)"></span>Awaiting contact</div></div>
      <div class="stat-card"><div class="stat-label">Contacted</div><div class="stat-value" style="color:var(--accent2)">${byStatus('contacted')}</div><div class="stat-sub"><span class="dot" style="background:var(--accent2)"></span>In progress</div></div>
      <div class="stat-card"><div class="stat-label">Converted</div><div class="stat-value" style="color:var(--green)">${byStatus('converted')}</div><div class="stat-sub"><span class="dot" style="background:var(--green)"></span>Closed deals</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px">
      <div class="table-wrap" style="padding:20px">
        <div style="font-family:var(--font-head);font-weight:700;margin-bottom:14px;font-size:0.95rem">Lead Sources</div>
        ${Object.entries(bySrc).map(([src,cnt])=>`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:5px">
              <span>${src}</span><span style="color:var(--accent)">${cnt}</span>
            </div>
            <div style="background:var(--surface2);border-radius:99px;height:6px">
              <div style="background:var(--accent);height:6px;border-radius:99px;width:${Math.round(cnt/total*100)}%;transition:width 0.5s"></div>
            </div>
          </div>`).join('')}
      </div>
      <div class="table-wrap" style="padding:20px">
        <div style="font-family:var(--font-head);font-weight:700;margin-bottom:14px;font-size:0.95rem">Recent Leads</div>
        ${[...state.leads].reverse().slice(0,5).map(l=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.75rem">
            <div>
              <div style="font-family:var(--font-head);font-weight:700">${l.name}</div>
              <div style="color:var(--muted)">${l.source}</div>
            </div>
            <span class="status-badge status-${l.status}">${l.status}</span>
          </div>`).join('')}
      </div>
    </div>
  `;
}

// ── LEADS VIEW ────────────────────────────────────────────────────────────
function filteredLeads() {
  return state.leads.filter(l => {
    const q = state.filter.search.toLowerCase();
    const matchSearch = !q || l.name.toLowerCase().includes(q) || l.email.toLowerCase().includes(q) || l.source.toLowerCase().includes(q);
    const matchStatus = state.filter.status==='all' || l.status===state.filter.status;
    const matchSource = state.filter.source==='all' || l.source===state.filter.source;
    return matchSearch && matchStatus && matchSource;
  });
}
function leadsHTML() {
  const leads = filteredLeads();
  const total = state.leads.length;
  const byStatus = s => state.leads.filter(l=>l.status===s).length;
  return `
    <div class="topbar">
      <div class="page-title">All <span>Leads</span></div>
      <button class="btn btn-primary" id="add-lead-btn">+ Add Lead</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--text)">${total}</div></div>
      <div class="stat-card"><div class="stat-label">New</div><div class="stat-value" style="color:var(--accent)">${byStatus('new')}</div></div>
      <div class="stat-card"><div class="stat-label">Contacted</div><div class="stat-value" style="color:var(--accent2)">${byStatus('contacted')}</div></div>
      <div class="stat-card"><div class="stat-label">Converted</div><div class="stat-value" style="color:var(--green)">${byStatus('converted')}</div></div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input placeholder="Search leads..." id="search-input" value="${state.filter.search}"/>
      </div>
      <select id="filter-status">
        <option value="all">All Statuses</option>
        ${STATUSES.map(s=>`<option value="${s}" ${state.filter.status===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>
      <select id="filter-source">
        <option value="all">All Sources</option>
        ${SOURCES.map(s=>`<option value="${s}" ${state.filter.source===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      ${leads.length===0 ? `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No leads found</div></div>` : `
      <table>
        <thead><tr>
          <th>Name / Email</th><th>Phone</th><th>Source</th><th>Status</th><th>Notes</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${leads.map(l=>`
            <tr>
              <td>
                <div class="lead-name">${l.name}</div>
                <div class="lead-email">${l.email}</div>
              </td>
              <td style="color:var(--muted)">${l.phone||'—'}</td>
              <td><span class="source-tag">${l.source}</span></td>
              <td>
                <select class="status-select" data-id="${l.id}" style="background:transparent;border:none;color:inherit;font-family:var(--font-mono);font-size:0.72rem;cursor:pointer;padding:0">
                  ${STATUSES.map(s=>`<option value="${s}" ${l.status===s?'selected':''} style="background:var(--surface)">${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
                </select>
                <span class="status-badge status-${l.status}" style="pointer-events:none;display:none">${l.status}</span>
              </td>
              <td style="color:var(--muted)">${l.notes.length} note${l.notes.length!==1?'s':''}</td>
              <td><div class="actions">
                <button class="btn btn-ghost btn-sm view-btn" data-id="${l.id}">View</button>
                <button class="btn btn-ghost btn-sm edit-btn" data-id="${l.id}">Edit</button>
                <button class="btn btn-danger btn-sm del-btn" data-id="${l.id}">✕</button>
              </div></td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

// ── MODALS ────────────────────────────────────────────────────────────────
function modalHTML() {
  if (state.modal === 'add' || state.modal === 'edit') {
    const lead = state.modal==='edit' ? state.leads.find(l=>l.id===state.selectedId) : null;
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-head">
          <div class="modal-title">${state.modal==='add'?'Add New Lead':'Edit Lead'}</div>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Full Name *</label>
              <input class="form-input" id="f-name" placeholder="Jane Doe" value="${lead?lead.name:''}"/></div>
            <div class="form-group"><label class="form-label">Email *</label>
              <input class="form-input" id="f-email" type="email" placeholder="jane@example.com" value="${lead?lead.email:''}"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Phone</label>
              <input class="form-input" id="f-phone" placeholder="9876543210" value="${lead?lead.phone:''}"/></div>
            <div class="form-group"><label class="form-label">Source</label>
              <select class="form-input" id="f-source">
                ${SOURCES.map(s=>`<option value="${s}" ${lead&&lead.source===s?'selected':''}>${s}</option>`).join('')}
              </select></div>
          </div>
          <div class="form-group"><label class="form-label">Status</label>
            <select class="form-input" id="f-status">
              ${STATUSES.map(s=>`<option value="${s}" ${lead&&lead.status===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
            </select></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">${state.modal==='add'?'Add Lead':'Save Changes'}</button>
        </div>
      </div>
    </div>`;
  }
  if (state.modal === 'detail') {
    const lead = state.leads.find(l=>l.id===state.selectedId);
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal" style="width:560px">
        <div class="modal-head">
          <div>
            <div class="modal-title">${lead.name}</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:2px">${lead.email}</div>
          </div>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="detail-section">
            <div class="detail-section-title">Lead Info</div>
            <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${lead.phone||'—'}</span></div>
            <div class="detail-row"><span class="detail-key">Source</span><span class="source-tag">${lead.source}</span></div>
            <div class="detail-row"><span class="detail-key">Status</span><span class="status-badge status-${lead.status}">${lead.status}</span></div>
            <div class="detail-row"><span class="detail-key">Added</span><span class="detail-val">${lead.created}</span></div>
          </div>
          <div class="detail-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div class="detail-section-title" style="margin:0">Notes & Follow-ups (${lead.notes.length})</div>
              <button class="btn btn-ghost btn-sm" id="add-note-btn">+ Add Note</button>
            </div>
            ${lead.notes.length===0
              ? `<div style="color:var(--muted);font-size:0.78rem;padding:12px 0">No notes yet.</div>`
              : lead.notes.map((n,i)=>`
                <div class="note-item">
                  <div class="note-date">📝 ${n.date}</div>
                  <div>${n.text}</div>
                  <button class="del-note-btn btn btn-danger btn-sm" data-idx="${i}" style="margin-top:8px">Remove</button>
                </div>`).join('')}
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="modal-cancel">Close</button>
          <button class="btn btn-primary edit-from-detail" data-id="${lead.id}">Edit Lead</button>
        </div>
      </div>
    </div>`;
  }
  if (state.modal === 'note') {
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal" style="width:420px">
        <div class="modal-head">
          <div class="modal-title">Add Note</div>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Note / Follow-up</label>
            <textarea class="form-input" id="note-text" placeholder="Enter note or follow-up details..."></textarea></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="save-note-btn">Save Note</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

// ── BIND EVENTS ───────────────────────────────────────────────────────────
function bindAll() {
  // nav
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.onclick = () => { state.view = el.dataset.nav; render(); };
  });
  const logout = document.getElementById('logout-btn');
  if (logout) logout.onclick = () => { state.auth = false; render(); };

  if (state.view === 'leads') {
    // search & filters
    const si = document.getElementById('search-input');
    if (si) si.oninput = e => { state.filter.search = e.target.value; render(); };
    const fs = document.getElementById('filter-status');
    if (fs) fs.onchange = e => { state.filter.status = e.target.value; render(); };
    const fsr = document.getElementById('filter-source');
    if (fsr) fsr.onchange = e => { state.filter.source = e.target.value; render(); };

    // add lead
    const ab = document.getElementById('add-lead-btn');
    if (ab) ab.onclick = () => { state.modal = 'add'; render(); };

    // status selects inline
    document.querySelectorAll('.status-select').forEach(sel => {
      sel.onchange = e => {
        const lead = state.leads.find(l=>l.id===+e.target.dataset.id);
        if (lead) { lead.status = e.target.value; showToast('Status updated','success'); render(); }
      };
    });
    // view/edit/delete
    document.querySelectorAll('.view-btn').forEach(b => b.onclick = () => { state.selectedId=+b.dataset.id; state.modal='detail'; render(); });
    document.querySelectorAll('.edit-btn').forEach(b => b.onclick = () => { state.selectedId=+b.dataset.id; state.modal='edit'; render(); });
    document.querySelectorAll('.del-btn').forEach(b => b.onclick = () => {
      if (confirm('Delete this lead?')) { state.leads = state.leads.filter(l=>l.id!==+b.dataset.id); showToast('Lead deleted','error'); render(); }
    });
  }

  // modal bindings
  if (state.modal) {
    const mc = document.getElementById('modal-close');
    if (mc) mc.onclick = () => { state.modal=null; render(); };
    const mcan = document.getElementById('modal-cancel');
    if (mcan) mcan.onclick = () => { state.modal=null; render(); };
    const ov = document.getElementById('modal-overlay');
    if (ov) ov.onclick = e => { if(e.target===ov){state.modal=null;render();} };

    if (state.modal==='add'||state.modal==='edit') {
      const msave = document.getElementById('modal-save');
      if (msave) msave.onclick = () => {
        const name = document.getElementById('f-name').value.trim();
        const email = document.getElementById('f-email').value.trim();
        if (!name||!email) { alert('Name and email are required.'); return; }
        const phone = document.getElementById('f-phone').value.trim();
        const source = document.getElementById('f-source').value;
        const status = document.getElementById('f-status').value;
        if (state.modal==='add') {
          state.leads.push({ id:state.nextId++, name, email, phone, source, status, notes:[], created:new Date().toISOString().slice(0,10) });
          showToast('Lead added!','success');
        } else {
          const lead = state.leads.find(l=>l.id===state.selectedId);
          Object.assign(lead, { name, email, phone, source, status });
          showToast('Lead updated!','success');
        }
        state.modal=null; render();
      };
    }
    if (state.modal==='detail') {
      const anb = document.getElementById('add-note-btn');
      if (anb) anb.onclick = () => { state.modal='note'; render(); };
      document.querySelectorAll('.del-note-btn').forEach(b => b.onclick = () => {
        const lead = state.leads.find(l=>l.id===state.selectedId);
        lead.notes.splice(+b.dataset.idx,1); showToast('Note removed','error'); render();
      });
      const efd = document.querySelector('.edit-from-detail');
      if (efd) efd.onclick = () => { state.modal='edit'; render(); };
    }
    if (state.modal==='note') {
      const snb = document.getElementById('save-note-btn');
      if (snb) snb.onclick = () => {
        const txt = document.getElementById('note-text').value.trim();
        if (!txt) return;
        const lead = state.leads.find(l=>l.id===state.selectedId);
        lead.notes.push({ text:txt, date:new Date().toISOString().slice(0,10) });
        state.modal='detail'; showToast('Note added!','success'); render();
      };
    }
  }
}

function showToast(msg, type) {
  const icons = { success:'✓', error:'✕' };
  state.toast = { msg, type, icon: icons[type]||'ℹ' };
  setTimeout(()=>{ state.toast=null; render(); }, 2500);
}

// ── BOOT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
